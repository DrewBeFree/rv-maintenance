<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RV Maintenance</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛺</text></svg>">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://vqfyaoanqpbcpbwtetcz.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_BQR3QmatKdMWtwIirlA5Dw_DLfiEOY9';
  </script>
</head>
<body>

  <!-- ── Hub View ── -->
  <div id="hub-view">
    <header>
      <h1>⛺ RV MAINTENANCE</h1>
      <p class="sub">Freedom Elite 26HE · 2019</p>
    </header>
    <div id="hub-dashboard">
      <div id="vehicle-card">
        <div class="vc-icon">🚐</div>
        <div class="vc-info">
          <div class="vc-name">Freedom Elite 26HE</div>
          <div class="vc-meta">2019 Thor Motor Coach</div>
          <div class="vc-sessions" id="vc-sessions"></div>
        </div>
        <div class="health-block">
          <div class="health-ring" id="health-ring"></div>
          <div class="health-label">Health</div>
        </div>
      </div>
      <div id="stats-row">
        <div class="stat-pill" id="stat-overdue"><div class="stat-val">—</div><div class="stat-lbl">Overdue</div></div>
        <div class="stat-pill" id="stat-ok"><div class="stat-val">—</div><div class="stat-lbl">Up to date</div></div>
        <div class="stat-pill" id="stat-since"><div class="stat-val">—</div><div class="stat-lbl">Since last</div></div>
        <div class="stat-pill" id="stat-sessions"><div class="stat-val">—</div><div class="stat-lbl">Sessions</div></div>
      </div>
      <div id="activity-row">
        <div class="activity-panel">
          <div class="panel-heading">Recent activity</div>
          <div id="recent-list"></div>
        </div>
        <div class="activity-panel">
          <div class="panel-heading">Coming due</div>
          <div id="due-list"></div>
        </div>
      </div>
    </div>
    <div id="trip-grid"></div>
    <div id="maint-section">
      <div id="maint-toggle">
        <span class="maint-label">Maintenance</span>
        <span id="maint-arrow" class="maint-arrow">▾</span>
        <hr class="maint-hr">
        <span id="maint-overdue-badge" class="overdue-badge hidden"></span>
      </div>
      <div id="maint-list" class="collapsed"></div>
    </div>
  </div>

  <!-- ── Section View ── -->
  <div id="section-view" class="hidden">
    <header class="section-header">
      <button id="back-btn">← Back</button>
      <div class="section-title-wrap">
        <span id="section-icon"></span>
        <h2 id="section-title"></h2>
      </div>
      <button id="edit-toggle">Edit</button>
    </header>

    <!-- Run Mode -->
    <div id="run-mode">
      <div id="progress-wrap" class="hidden">
        <div id="progress-bar"></div>
        <span id="progress-label"></span>
      </div>
      <div class="action-row">
        <button class="start-session-btn primary-btn">Start Session</button>
        <button class="complete-session-btn primary-btn hidden">Complete Session</button>
      </div>
      <ul id="checklist"></ul>
      <div id="session-footer" class="hidden">
        <div id="session-date-row">
          <label class="session-date-label" for="session-date">Date</label>
          <input type="date" id="session-date">
        </div>
        <textarea id="session-notes" placeholder="Notes (optional)…" rows="3"></textarea>
      </div>
      <div class="action-row">
        <button class="start-session-btn primary-btn">Start Session</button>
        <button class="complete-session-btn primary-btn hidden">Complete Session</button>
      </div>
    </div>

    <!-- Edit Mode -->
    <div id="edit-mode" class="hidden">
      <ul id="edit-list"></ul>
      <div class="add-row">
        <input id="new-item-input" type="text" placeholder="Add checklist item…" maxlength="200">
        <button id="add-item-btn">Add</button>
      </div>
    </div>

    <!-- History Panel -->
    <div id="history-panel" class="hidden">
      <h3 class="history-heading">History</h3>
      <div id="history-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <footer style="text-align:center;padding:12px 20px 20px;font-size:9px;color:#888;letter-spacing:2px;text-transform:uppercase;font-family:inherit;">© 2026 Andrew Webb</footer>
</body>
</html>
